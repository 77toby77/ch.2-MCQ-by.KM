<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 2 — Elements of Grammar MCQ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede8;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9a9a96;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --green: #3B6D11; --green-bg: #EAF3DE; --green-text: #27500A;
    --red: #A32D2D; --red-bg: #FCEBEB; --red-text: #791F1F;
    --amber: #BA7517;
    --radius: 10px; --radius-sm: 7px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0efe8; --text2: #a8a8a2; --text3: #6e6e68;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --blue: #378ADD; --blue-bg: #042C53; --blue-text: #85B7EB;
      --green: #639922; --green-bg: #173404; --green-text: #C0DD97;
      --red: #E24B4A; --red-bg: #501313; --red-text: #F09595;
      --amber: #EF9F27;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  .page-header { margin-bottom: 2rem; }
  .page-header h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .page-header p { font-size: 14px; color: var(--text2); }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
  .progress-wrap { background: var(--bg2); border-radius: 99px; height: 6px; margin-bottom: 6px; overflow: hidden; }
  .progress-bar { background: var(--blue); height: 6px; border-radius: 99px; transition: width 0.3s ease; }
  .progress-label { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
  .filter-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .filter-btn { font-size: 12px; padding: 4px 11px; border: 0.5px solid var(--border); border-radius: 99px; background: var(--bg2); color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .section-badge { display: inline-block; font-size: 11px; font-weight: 600; background: var(--blue-bg); color: var(--blue-text); padding: 2px 9px; border-radius: 99px; margin-bottom: 10px; letter-spacing: 0.02em; }
  .q-number { font-size: 12px; color: var(--text3); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .q-text { font-size: 15px; color: var(--text); line-height: 1.65; margin-bottom: 1.1rem; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 11px 15px; font-size: 14px; color: var(--text); cursor: pointer; text-align: left; line-height: 1.5; transition: background 0.15s, border-color 0.15s; width: 100%; font-family: inherit; }
  .opt:hover:not(.locked) { background: var(--bg3); border-color: var(--border2); }
  .opt.selected { border-color: var(--blue); background: var(--blue-bg); color: var(--blue-text); }
  .opt.correct { border-color: var(--green); background: var(--green-bg); color: var(--green-text); font-weight: 500; }
  .opt.wrong { border-color: var(--red); background: var(--red-bg); color: var(--red-text); }
  .opt.locked { cursor: default; }
  .feedback { font-size: 13px; margin-top: 12px; padding: 10px 14px; border-radius: var(--radius-sm); line-height: 1.6; }
  .feedback.correct { background: var(--green-bg); color: var(--green-text); }
  .feedback.wrong { background: var(--red-bg); color: var(--red-text); }
  .nav-row { display: flex; gap: 10px; justify-content: space-between; align-items: center; margin-top: 1.25rem; }
  .btn { border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 9px 20px; font-size: 14px; background: var(--bg); color: var(--text); cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn:hover:not(:disabled) { background: var(--bg2); }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 500; }
  .btn.primary:hover:not(:disabled) { background: var(--blue-text); }
  .results-center { text-align: center; padding: 1.5rem 0; }
  .score-big { font-size: 56px; font-weight: 700; line-height: 1; }
  .score-label { font-size: 16px; color: var(--text2); margin-top: 6px; margin-bottom: 1.5rem; }
  .breakdown { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .bk { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px 10px; }
  .bk-num { font-size: 26px; font-weight: 600; }
  .bk-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .bk.c .bk-num { color: var(--green); }
  .bk.w .bk-num { color: var(--red); }
  .bk.s .bk-num { color: var(--blue); }
  .result-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  @media (max-width: 480px) {
    body { padding: 1rem 0.5rem; }
    .card { padding: 1.1rem; }
    .score-big { font-size: 42px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <h1>Chapter 2 — Elements of Grammar</h1>
    <p>55 multiple choice questions &nbsp;·&nbsp; Select the best answer for each question</p>
  </div>
  <div id="quiz-area"></div>
</div>
<script>
const allQ=[
  {s:"Subject & Predicate",q:"What are the two core parts every sentence is divided into?",o:["Subject and Object","Subject and Predicate","Operator and Predication","Theme and Rheme"],a:1,e:"Every sentence splits into a Subject (the theme/topic) and a Predicate (the new information stated about the subject)."},
  {s:"Subject & Predicate",q:"Which of the following best defines the SUBJECT of a sentence?",o:["The new information being stated","The verb phrase of the sentence","Who or what the sentence is about","The part that controls concord only"],a:2,e:"The subject is the theme/topic of the sentence — who or what it is about."},
  {s:"Subject & Predicate",q:"Concord refers to:",o:["The placement of adverbials","Grammatical agreement between subject and verb","The movement of the operator in questions","The distinction between objects and complements"],a:1,e:"Concord (agreement) means the subject controls the verb form — singular or plural."},
  {s:"Subject & Predicate",q:'In the question "Had he given the girl an apple?", which element moved?',o:["The subject","The direct object","The operator","The adverbial"],a:2,e:"The operator 'had' moved to the front. In question formation, the operator (first auxiliary) moves before the subject."},
  {s:"Operator & Predication",q:"In 'He had given the girl an apple', what is the PREDICATION?",o:["He","had","given the girl an apple","had given"],a:2,e:"The predication is everything after the operator. 'had' is the operator; 'given the girl an apple' is the predication."},
  {s:"Operator & Predication",q:"When a sentence has multiple auxiliaries, which one acts as the OPERATOR?",o:["The last auxiliary","The main verb","The first auxiliary","Any auxiliary that shows tense"],a:2,e:"When there are multiple auxiliaries, the FIRST auxiliary is always the operator. E.g., in 'He should have been questioned', 'should' is the operator."},
  {s:"Operator & Predication",q:'What operator is introduced when a sentence has NO auxiliary verb? (e.g., "It rained")',o:["be","have","do","will"],a:2,e:"When there is no auxiliary, 'do' is introduced as operator. E.g., 'It rained' becomes 'Did it rain?'"},
  {s:"Operator & Predication",q:"Which two verbs can act as operators even as MAIN verbs (especially in BrE)?",o:["do and have","be and have","be and do","will and be"],a:1,e:"Be and have (in British English) can act as operators as main verbs. E.g., 'He has a degree' becomes 'Has he a degree?'"},
  {s:"Sentence Elements",q:"What do the five sentence elements S, V, C, O, A stand for?",o:["Subject, Verb, Complement, Object, Adverbial","Subject, Voice, Clause, Object, Auxiliary","Syntax, Verb, Conditional, Object, Aspect","Subject, Verb, Complement, Operator, Adverbial"],a:0,e:"The five elements are: S = Subject, V = Verb, C = Complement, O = Object, A = Adverbial."},
  {s:"Sentence Elements",q:'In "John carefully searched the room", label the elements correctly:',o:["S+A+V+O","S+V+A+O","A+S+V+O","S+V+O+A"],a:0,e:"John (S) carefully (A) searched (V) the room (O)."},
  {s:"Complements & Objects",q:"What is the key difference between a Direct Object (Od) and an Indirect Object (Oi)?",o:["Oi always follows Od","Oi almost always precedes Od and typically refers to a recipient","Od refers to a person; Oi refers to a thing","They are interchangeable"],a:1,e:"The Indirect Object almost always precedes the Direct Object and typically refers to a recipient (a person). E.g., 'He gave [her](Oi) [an apple](Od).'"},
  {s:"Complements & Objects",q:"A Subject Complement (Cs) describes or identifies:",o:["The direct object","The indirect object","The subject","The adverbial"],a:2,e:"A Subject Complement describes or identifies the subject. E.g., 'The girl is a student' — 'a student' is Cs."},
  {s:"Complements & Objects",q:'In "They made him the chairman", what is "the chairman"?',o:["Direct Object (Od)","Indirect Object (Oi)","Subject Complement (Cs)","Object Complement (Co)"],a:3,e:"'The chairman' is an Object Complement (Co) — it describes or identifies the direct object 'him'."},
  {s:"Complements & Objects",q:"If a Direct Object is absent, can an Indirect Object still appear in a sentence?",o:["Yes, always","No, an Od must be present if an Oi exists","Yes, but only with stative verbs","Yes, only in yes-no questions"],a:1,e:"The Direct Object must be present if an Indirect Object exists."},
  {s:"Categories of Verb",q:"Which type of verb is used with a Subject Complement?",o:["Extensive","Intransitive","Intensive","Ditransitive"],a:2,e:"Intensive verbs are used with subject complements (e.g., 'be', 'become', 'seem')."},
  {s:"Categories of Verb",q:"A DITRANSITIVE verb takes:",o:["Only a direct object","A direct object and an object complement","A direct object and an indirect object","No object at all"],a:2,e:"A ditransitive verb takes both a direct object AND an indirect object. E.g., 'give', 'offer', 'make (someone something)'."},
  {s:"Categories of Verb",q:"A COMPLEX TRANSITIVE verb takes:",o:["Two indirect objects","A direct object and an object complement","Only a subject complement","An indirect object and no direct object"],a:1,e:"Complex transitive verbs take a direct object and an object complement. E.g., 'They elected him chairman.'"},
  {s:"Categories of Verb",q:'Which category applies to the verb in "It rained"?',o:["Monotransitive","Ditransitive","Intransitive","Complex transitive"],a:2,e:"'Rained' takes no object or complement — it is intransitive."},
  {s:"Categories of Verb",q:"Extensive verbs are subdivided into which four types?",o:["Intensive, stative, dynamic, complex","Intransitive, monotransitive, ditransitive, complex transitive","Declarative, interrogative, negative, affirmative","Stative, dynamic, finite, non-finite"],a:1,e:"Extensive verbs subdivide into: intransitive, monotransitive, ditransitive, and complex transitive."},
  {s:"Stative vs Dynamic",q:"Which verbs CAN use the progressive (be + -ing)?",o:["Stative verbs","Intensive verbs only","Dynamic verbs","Both stative and dynamic always"],a:2,e:"Dynamic verbs can use the progressive. Stative verbs cannot. E.g., 'It was raining' (dynamic) vs. *'The girl is being a student' (unacceptable)."},
  {s:"Stative vs Dynamic",q:'Why is "John is knowing the answer" unacceptable?',o:["'Know' is an extensive verb","'Know' is a stative verb and cannot take the progressive","'Know' is intransitive","Questions use the operator not progressive"],a:1,e:"'Know' is a stative verb. Stative verbs cannot use the progressive form."},
  {s:"Stative vs Dynamic",q:"Process adverbials (e.g., 'carefully', 'slowly') can ONLY occur with:",o:["Stative verbs","Dynamic verbs","Intensive verbs","Intransitive verbs"],a:1,e:"Process adverbials can only occur with dynamic verbs. They are unacceptable with stative verbs."},
  {s:"Stative vs Dynamic",q:'The verb "be" is generally stative. When can it be used dynamically?',o:["When it is in passive voice","When the complement is dynamic (e.g., 'He is being naughty')","When it is the operator in a question","When the subject is a pronoun"],a:1,e:"'Be' can be used dynamically when the complement is dynamic: 'He is being naughty' — 'naughty' is a dynamic adjective."},
  {s:"Adverbials",q:"Which three types of adverbials are mentioned in the chapter?",o:["Time, place, process","Subject, object, complement","Finite, non-finite, infinitive","Direct, indirect, complex"],a:0,e:"The three main adverbial types are: time adverbials, place adverbials, and process adverbials."},
  {s:"Adverbials",q:'Why is "The girl is now" unacceptable on its own?',o:["'Now' cannot follow stative verbs","A time adverbial alone cannot complete such a sentence; a place adverbial is also required","The subject must precede an adverbial","There is no operator in the sentence"],a:1,e:"A time adverbial alone cannot complete a sentence with a stative intensive verb — a place adverbial is also required."},
  {s:"Adverbials",q:"Adverbials can be realized by which four structural types?",o:["Noun phrase, adjective phrase, verb phrase, clause","Adverb phrase, noun phrase, prepositional phrase, clause","Pronoun, noun, conjunction, preposition","Subject, verb, object, complement"],a:1,e:"Adverbials can be realized by: adverb phrase, noun phrase, prepositional phrase, and clause (finite or non-finite)."},
  {s:"Sentence Patterns",q:'Sentence pattern [1] "She is in London" is classified as:',o:["Dynamic, intransitive","Stative, with place adverbial","Dynamic, intensive, with Cs","Stative, monotransitive"],a:1,e:"Pattern [1] is stative with a place adverbial. 'Is' is stative intensive, and 'in London' is an adverbial of place."},
  {s:"Sentence Patterns",q:'Which pattern does "They offered her some chocolates" represent?',o:["S+V Dyn. monotrans.+Od","S+V Dyn. complex trans.+Od+Co","S+V Dyn. ditrans.+Oi+Od","S+V stat.+Cs"],a:2,e:"'Offered' is dynamic ditransitive. 'her' = Oi, 'some chocolates' = Od. Pattern [6]: S+V Dyn. ditrans.+Oi+Od."},
  {s:"Sentence Patterns",q:'Pattern [8] "The train had arrived (quietly)" is:',o:["Dynamic, monotransitive","Dynamic, intransitive","Stative, intransitive","Dynamic, intensive"],a:1,e:"Pattern [8] is dynamic intransitive — no object or complement, just an optional process adverbial."},
  {s:"Element Realization",q:"The Verb element is always realized by:",o:["A noun phrase","A verb phrase (finite or non-finite)","An adjective phrase","A prepositional phrase"],a:1,e:"The Verb element is always a verb phrase — either finite (showing tense/mood) or non-finite (to-infinitive, -ing form, past participle)."},
  {s:"Element Realization",q:"Indirect objects can only be realized by:",o:["Adjective phrases","That-clauses","Noun phrases only","Prepositional phrases"],a:2,e:"Indirect objects are realized by noun phrases ONLY — they cannot be that-clauses."},
  {s:"Element Realization",q:'What realization type is the opening phrase in: "Carefully searching the room, John found a ring."?',o:["Finite clause","Simple non-finite verb phrase","Non-finite clause","Adverb phrase"],a:2,e:"'Carefully searching the room' is a non-finite clause — a complex non-finite verb phrase functioning as an adverbial."},
  {s:"Element Realization",q:"Subject and object complements can be realized by:",o:["Noun phrases only","Adjective phrases only","Noun phrases or adjective phrases","Verb phrases only"],a:2,e:"Subject and object complements can be realized by either noun phrases or adjective phrases."},
  {s:"Parts of Speech",q:"Which group contains OPEN-CLASS items?",o:["Article, Demonstrative, Pronoun, Preposition","Noun, Adjective, Adverb, Verb","Conjunction, Interjection, Article, Pronoun","Preposition, Conjunction, Verb, Noun"],a:1,e:"Open-class items are: Noun, Adjective, Adverb, and Verb. These categories can be indefinitely extended with new words."},
  {s:"Parts of Speech",q:"Which group contains CLOSED-SYSTEM items?",o:["Noun, Verb, Adjective, Adverb","Article, Demonstrative, Pronoun, Preposition, Conjunction, Interjection","Preposition, Noun, Adjective, Conjunction","Verb, Adverb, Article, Pronoun"],a:1,e:"Closed-system items include: Article, Demonstrative, Pronoun, Preposition, Conjunction, and Interjection."},
  {s:"Parts of Speech",q:"'Reciprocally exclusive' (closed-system) means:",o:["Items from different systems cannot combine","Choosing one item excludes all others in the system (e.g., the book or a book, not both)","Closed-system items can never be used in questions","They can be freely extended unlike open-class items"],a:1,e:"Reciprocally exclusive means choosing one item rules out all others in the same system. You cannot say 'the a book'."},
  {s:"Parts of Speech",q:"Which word belongs to MORE THAN ONE part of speech — as a noun, verb, adjective, adverb, and preposition?",o:["table","quickly","although","round"],a:3,e:"'Round' can function as a noun, verb, adjective, adverb, and preposition — a classic example of a multi-class word."},
  {s:"Parts of Speech",q:"Within the open-class category of verbs, which subgroup is CLOSED?",o:["Transitive verbs","Intransitive verbs","Auxiliaries","Stative verbs"],a:2,e:"Auxiliaries form a closed subgroup within verbs — new auxiliaries are almost never invented."},
  {s:"Stative vs Dynamic (Open Class)",q:"Which parts of speech are typically associated with the STATIVE category?",o:["Verbs and adverbs","Nouns and adjectives","Adjectives and adverbs","Nouns and verbs"],a:1,e:"Nouns and adjectives are typically stative — they refer to stable entities or conditions. Verbs and adverbs are typically dynamic."},
  {s:"Pro-forms",q:"Pro-forms are used to:",o:["Introduce new information into a sentence","Replace elements to avoid repetition","Form yes-no questions","Indicate assertion vs. non-assertion"],a:1,e:"Pro-forms replace elements to avoid repetition and facilitate sentence connection."},
  {s:"Pro-forms",q:"Which pro-form replaces a PLACE adverbial?",o:["then","so","there","do so"],a:2,e:"'There' replaces place adverbials. 'Then' replaces time adverbials. 'So' replaces process adverbials."},
  {s:"Pro-forms",q:"Which pro-form replaces an entire PREDICATION?",o:["so","then","there","do so"],a:3,e:"'Do so' replaces an entire predication. E.g., 'He didn't do so' replaces whatever predication was stated before."},
  {s:"Wh-Questions",q:"In wh-questions, where does the wh-word ALWAYS appear?",o:["At the end of the sentence","After the subject","First in the sentence","After the operator"],a:2,e:"The key rule is: the wh-word always comes first in a wh-question."},
  {s:"Wh-Questions",q:'Which wh-question asks about the SUBJECT of "They make him the chairman every year"?',o:["Whom do they make the chairman?","What do they make him?","Who makes him the chairman every year?","When do they make him chairman?"],a:2,e:"'Who makes him the chairman every year?' asks about the Subject. When asking about the subject, no operator inversion is needed."},
  {s:"Wh-Questions",q:"Wh-words signal that the referent:",o:["Has been mentioned before","Is known and shared","Is not known and must be stated","Is stative, not dynamic"],a:2,e:"Wh-words indicate the referent is NOT known — it must be stated. This is why wh-words form questions."},
  {s:"Yes-No Questions",q:"Yes-no questions ask about:",o:["A specific sentence element (who, what, when)","The truth of an entire predication","The grammatical category of the subject","The position of the adverbial"],a:1,e:"Yes-no questions ask whether the entire predication is true or not. The expected answer is simply yes or no."},
  {s:"Yes-No Questions",q:"The order of elements in a yes-no question is:",o:["Subject + Operator + Predication","Predication + Operator + Subject","Operator + Subject + Predication","Subject + Predication + Operator"],a:2,e:"Yes-no questions reverse declarative order: Operator comes first, then subject, then the rest of the predication."},
  {s:"Negation & Non-Assertion",q:"A positive declarative sentence is called:",o:["A non-assertion","An interrogative","An assertion","A predication"],a:2,e:"A positive declarative sentence is an ASSERTION. It becomes non-assertive by being either negative or interrogative."},
  {s:"Negation & Non-Assertion",q:"Which word is used in both questions and negatives instead of 'some'?",o:["no","any","every","some"],a:1,e:"Both questions and negatives use 'any' instead of 'some'. E.g., 'He offered her some chocolates' becomes 'Did he offer her any?' or 'He didn't offer her any.'"},
  {s:"Negation & Non-Assertion",q:"Non-assertion is produced by:",o:["Positive + declarative","Being either negative OR interrogative","Using a wh-word at the end","Moving the adverbial to the front"],a:1,e:"Non-assertion = interrogative OR negative. Both turn an assertion into a non-assertive sentence."},
  {s:"Workbook Practice",q:'In "Do you understand the question?" the verb is:',o:["Intensive, dynamic, intransitive","Extensive, stative, monotransitive","Extensive, dynamic, ditransitive","Intensive, stative, monotransitive"],a:1,e:"'Understand' is extensive (takes an object), stative (cannot be progressive), and monotransitive (one direct object)."},
  {s:"Workbook Practice",q:'In "We elected him President unanimously", the verb is:',o:["Extensive, dynamic, ditransitive","Extensive, dynamic, complex transitive","Intensive, stative, monotransitive","Extensive, stative, complex transitive"],a:1,e:"'Elected' is extensive, dynamic, and complex transitive — it takes Od ('him') + Co ('President')."},
  {s:"Workbook Practice",q:'In "His mother-in-law was driving him mad", what is "mad"?',o:["Subject Complement (Cs)","Direct Object (Od)","Object Complement (Co)","Indirect Object (Oi)"],a:2,e:"'Mad' is the Object Complement (Co) — it describes the direct object 'him'. The verb 'drive' is complex transitive."},
  {s:"Workbook Practice",q:'Which sentence is "Non-assertion, interrogative, negative"?',o:["Some of the others have finished it already.","Have you finished this chapter yet?","I never have much to do in the evening.","Haven't you got anything to do?"],a:3,e:"'Haven't you got anything to do?' is interrogative (it's a question) and negative ('haven't'): non-assertion, interrogative, negative."},
  {s:"Workbook Practice",q:'In "Tomorrow will be a holiday here." label the elements:',o:["A+V+Cs+A","S+V+O+A","A+S+V+Cs","S+A+V+Cs"],a:0,e:"Tomorrow (A-time) / will be (V) / a holiday (Cs) / here (A-place). 'Tomorrow' is an adverbial, not subject."},
  {s:"Workbook Practice",q:'In "I thoroughly enjoyed meeting June again", "meeting June again" is realized by:',o:["A finite clause","A noun phrase","A non-finite clause","An adjective phrase"],a:2,e:"'Meeting June again' is a non-finite clause (non-finite -ing form) functioning as the Direct Object."},
];

let cur=0,ans=new Array(allQ.length).fill(null),lkd=new Array(allQ.length).fill(false),flt="All";
function secs(){return["All",...new Set(allQ.map(q=>q.s))];}
function fidxs(){return flt==="All"?allQ.map((_,i)=>i):allQ.map((_,i)=>i).filter(i=>allQ[i].s===flt);}
function qi(){return fidxs()[cur];}
function FR(){return secs().map(s=>`<button class="filter-btn${flt===s?" active":""}" onclick="setF('${s.replace(/'/g,"\\'")}')">${s==="All"?"All ("+allQ.length+")":s}</button>`).join("");}
function setF(s){flt=s;cur=0;render();}
function render(){
  const idxs=fidxs();
  if(!idxs.length){document.getElementById("quiz-area").innerHTML='<div class="card"><p style="color:var(--text2)">No questions in this section.</p></div>';return;}
  const q=allQ[qi()],tot=idxs.length,done=idxs.filter(i=>ans[i]!==null).length,pct=Math.round(done/tot*100);
  const opts=q.o.map((o,i)=>{let c="opt";if(lkd[qi()]){c+=" locked";if(i===q.a)c+=" correct";else if(i===ans[qi()])c+=" wrong";}else if(ans[qi()]===i)c+=" selected";return`<button class="${c}" onclick="pick(${i})">${String.fromCharCode(65+i)}. ${o}</button>`;}).join("");
  let fb="";if(lkd[qi()]&&ans[qi()]!==null){const ok=ans[qi()]===q.a;fb=`<div class="feedback ${ok?"correct":"wrong"}">${ok?"✓ Correct — ":"✗ Incorrect — "}${q.e}</div>`;}
  document.getElementById("quiz-area").innerHTML=`
    <div class="filter-row">${FR()}</div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    <div class="progress-label">Question ${cur+1} of ${tot} &nbsp;·&nbsp; ${done} answered</div>
    <div class="card">
      <div class="section-badge">${q.s}</div>
      <div class="q-number">Question ${cur+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${opts}</div>${fb}
    </div>
    <div class="nav-row">
      <button class="btn" onclick="nav(-1)" ${cur===0?"disabled":""}>← Previous</button>
      <div style="display:flex;gap:8px;">
        ${!lkd[qi()]&&ans[qi()]!==null?`<button class="btn primary" onclick="sub()">Check answer</button>`:""}
        ${lkd[qi()]&&cur<tot-1?`<button class="btn primary" onclick="nav(1)">Next →</button>`:""}
        ${lkd[qi()]&&cur===tot-1?`<button class="btn primary" onclick="results()">See results</button>`:""}
      </div>
      <button class="btn" onclick="nav(1)" ${cur===tot-1?"disabled":""}>Next →</button>
    </div>`;
}
function pick(i){if(lkd[qi()])return;ans[qi()]=i;render();}
function sub(){if(ans[qi()]===null)return;lkd[qi()]=true;render();}
function nav(d){const t=fidxs().length;cur=Math.max(0,Math.min(t-1,cur+d));render();}
function results(){
  const idxs=fidxs(),tot=idxs.length;
  const correct=idxs.filter(i=>lkd[i]&&ans[i]===allQ[i].a).length;
  const wrong=idxs.filter(i=>lkd[i]&&ans[i]!==allQ[i].a).length;
  const skip=idxs.filter(i=>!lkd[i]).length;
  const pct=Math.round(correct/tot*100);
  const grade=pct>=90?"Excellent":pct>=75?"Good":pct>=60?"Fair":"Needs revision";
  const gc=pct>=90?"var(--green)":pct>=75?"var(--blue)":pct>=60?"var(--amber)":"var(--red)";
  document.getElementById("quiz-area").innerHTML=`
    <div class="filter-row">${FR()}</div>
    <div class="card results-center">
      <div class="score-big" style="color:${gc}">${pct}%</div>
      <div class="score-label">${grade} &nbsp;·&nbsp; ${correct}/${tot} correct</div>
      <div class="breakdown">
        <div class="bk c"><div class="bk-num">${correct}</div><div class="bk-lbl">Correct</div></div>
        <div class="bk w"><div class="bk-num">${wrong}</div><div class="bk-lbl">Wrong</div></div>
        <div class="bk s"><div class="bk-num">${skip}</div><div class="bk-lbl">Skipped</div></div>
      </div>
      <div class="result-btns">
        <button class="btn primary" onclick="restart()">Restart quiz</button>
        <button class="btn" onclick="reviewW()">Review wrong answers</button>
      </div>
    </div>`;
}
function restart(){cur=0;ans=new Array(allQ.length).fill(null);lkd=new Array(allQ.length).fill(false);render();}
function reviewW(){const idxs=fidxs(),w=idxs.filter(i=>lkd[i]&&ans[i]!==allQ[i].a);if(!w.length){alert("No wrong answers to review!");return;}cur=fidxs().indexOf(w[0]);render();}
render();
</script>
</body>
</html>
